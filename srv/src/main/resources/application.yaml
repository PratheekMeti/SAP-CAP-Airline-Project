---
server:
  port: 8080

spring:
  config:
    activate:
      on-profile: default

  datasource:
    url: jdbc:h2:mem:airlinedb
    driverClassName: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      platform: h2

  h2:
    console:
      enabled: true

cds:
  datasource:
    auto-config:
      enabled: false
